# loops.yaml shell scheduler example (https://github.com/acoyfellow/loops-yaml)
# Run once: loops run orbit-public-web
# Schedule continuously: loops watch
version: 1
loops:
  orbit-public-web:
    schedule: "0 */6 * * *"
    run: "npm run orbit -- run examples/public-web.json orbit-output"
    cwd: "/absolute/path/to/orbit"
